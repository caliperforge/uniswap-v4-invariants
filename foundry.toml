# uniswap-v4-invariants pins (build spec §3, do not relitigate here):
# solc exactly 0.8.26 (PoolManager.sol pragma is exact), cancun for
# transient storage, via_ir=false (matches v4-core's own debug profile;
# spike proved via-IR is not required and keeps builds at ~1-3 s).
# The solmate/ and @openzeppelin/ remappings exist ONLY so v4-core's
# internal imports resolve from our project root; our own code never
# imports either (solmate is AGPL-3.0-only).

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"

solc_version = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false

remappings = [
    "forge-std/=lib/forge-std/src/",
    "v4-core/=lib/v4-core/",
    "solmate/=lib/v4-core/lib/solmate/",
    "@openzeppelin/=lib/v4-core/lib/openzeppelin-contracts/",
]

ffi = false

# House fuzz-campaign convention: 256 runs x depth 50 per invariant.
[invariant]
runs = 256
depth = 50
fail_on_revert = true
