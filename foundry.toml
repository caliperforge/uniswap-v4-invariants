# uniswap-v4-invariants pins (build spec ┬¦3, do not relitigate here):
# solc 0.8.33 on the `substrate-modern` branch (bumped from 0.8.26 to
# clear the combo wall: solc 0.8.28+ AND the newer Labs
# `v4-periphery/BaseHook` lineage AND live Permit2/POSM prereqs, e.g.
# Moonpot's `pragma solidity 0.8.33;` exact pin). 0.8.30 was considered
# and rejected -- Moonpot's pragma is EXACT 0.8.33 so 0.8.30 fails the
# acceptance test; 0.8.33 is the tightest fit that clears the wall.
# cancun for transient storage, via_ir=false (matches v4-core's own
# debug profile; spike proved via-IR is not required and keeps builds
# at ~1-3 s). The solmate/ and @openzeppelin/ remappings exist ONLY
# so v4-core's internal imports resolve from our project root; our
# own code never imports either (solmate is AGPL-3.0-only).

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"

solc_version = "0.8.33"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true  # wall-class adopters (Moonpot etc.) hit "Stack too deep" without via-IR; the harness itself still builds green under via-IR (verified on substrate-modern), just ~3-5x slower per compile.

remappings = [
    "forge-std/=lib/forge-std/src/",
    "v4-core/=lib/v4-core/",
    # `@uniswap/v4-core/` alias for `v4-core/` -- OZ's uniswap-hooks
    # BaseHook and current-upstream v4 hooks (e.g. Alphix) import
    # v4-core types via the npm-package prefix `@uniswap/v4-core/...`;
    # our own code and the harness import them via `v4-core/...`. Point
    # both prefixes at the SAME physical submodule so the graph carries
    # ONE `IPoolManager` type -- otherwise Foundry silently auto-infers
    # `@uniswap/v4-core/=lib/openzeppelin-uniswap-hooks/lib/v4-core/`
    # and the adopter build fails with "invalid implicit conversion
    # from IPoolManager to IPoolManager". Required for the caliper
    # multi-file adopter run.
    "@uniswap/v4-core/=lib/v4-core/",
    # Labs newer BaseHook lineage + Permit2/POSM prereqs are needed
    # for wall-class adopters (Moonpot, bonker, etc.). The
    # `substrate-modern` branch mounts `lib/v4-hooks-public` which
    # itself carries `lib/v4-periphery` + `lib/v4-periphery/lib/permit2`
    # as nested submodules. Point each npm prefix at its physical
    # location. All three trees are pragma-compatible with the 0.8.33
    # compiler bump; no fork/patch needed here (in contrast to the
    # single pragma relax on `lib/v4-core/src/PoolManager.sol`).
    "@uniswap/v4-hooks-public/=lib/v4-hooks-public/",
    "@uniswap/v4-periphery/=lib/v4-hooks-public/lib/v4-periphery/",
    "@uniswap/permit2/=lib/v4-hooks-public/lib/v4-periphery/lib/permit2/",
    "permit2/=lib/v4-hooks-public/lib/v4-periphery/lib/permit2/",
    "solmate/=lib/v4-core/lib/solmate/",
    # More-specific `@openzeppelin/uniswap-hooks/` and
    # `@openzeppelin/contracts/` MUST sit before the shorter
    # `@openzeppelin/=` fallback (Foundry does first-match-wins on
    # prefix; declaration order is the tiebreaker).
    # Modern OZ Uniswap Hooks releases (>= v1.2) and current-upstream
    # hooks import BaseHook / CurrencySettler via this npm-prefix
    # path; the caliper adopter needs it for any hook not built
    # against our vendored v1.1.0 tree.
    "@openzeppelin/uniswap-hooks/=lib/openzeppelin-uniswap-hooks/",
    # Alphix (and any OZ hook >= v5.1) needs
    # `ReentrancyGuardTransient` / `TransientSlot` / `SlotDerivation`,
    # which v4-core's pinned OZ contracts (v5.0.2) do not carry. OZ
    # hooks's nested `openzeppelin-contracts` submodule is v5.3.0 and
    # does carry them. v4-core's own only `@openzeppelin/contracts/*`
    # import is `Proxy.sol`, present in both versions -- safe redirect
    # for the harness itself.
    "@openzeppelin/contracts/=lib/openzeppelin-uniswap-hooks/lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/=lib/v4-core/lib/openzeppelin-contracts/",
    # C-P2 pins the OZ Uniswap Hooks library at tag v1.2.1 so a reviewer
    # can diff our clean twin against the audited post-`2678eb9` base
    # library. The clean twin subclasses OZ's actual fixed
    # `BaseDynamicAfterFee`, vendored under the case dir at
    # `src/cases/p2-dynamicfee-direction-integrity/vendor/oz-uniswap-hooks-v1.1.0/`
    # (see that dir's NOTICE for the patch policy: sibling imports
    # rewritten to `./` paths; `SwapParams` / `ModifyLiquidityParams`
    # imported from `v4-core/src/types/PoolOperation.sol` as upstream
    # v1.1.0 does, resolved via the v4-core pin at `^1.0.2` which
    # carries `PoolOperation.sol`; no fee-arithmetic byte altered).
    # The submodule remains pinned here so a reviewer can byte-compare
    # the vendored file to the audited source.
    "openzeppelin-uniswap-hooks/=lib/openzeppelin-uniswap-hooks/",
    # The vendored `BaseDynamicAfterFee.sol` and `CurrencySettler.sol`
    # import from `openzeppelin/utils/*` and `openzeppelin/token/ERC20/*`
    # (the OZ Uniswap Hooks project's own remapping prefix). Resolve
    # those source paths into the OZ Uniswap Hooks submodule's nested
    # `openzeppelin-contracts` (v5.3.0, which carries the
    # `TransientSlot` / `SlotDerivation` / `SafeCast` shapes the vendored
    # base library expects). Distinct prefix from `@openzeppelin/`; no
    # other case imports under this prefix, so the additive-only rail
    # holds.
    "openzeppelin/=lib/openzeppelin-uniswap-hooks/lib/openzeppelin-contracts/contracts/",
]

ffi = false

# House fuzz-campaign convention: 256 runs x depth 50 per invariant.
[invariant]
runs = 256
depth = 50
fail_on_revert = true
